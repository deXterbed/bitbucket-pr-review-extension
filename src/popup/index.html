<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bitbucket PR Review</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Bitbucket PR Review
    </div>
    <button id="settingsButton" class="settings-btn" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
  </div>

  <!-- Inline confirm bar (appears when Settings is clicked) -->
  <div id="confirmBar" class="confirm-bar" style="display:none">
    <span class="confirm-text">Clear your API key?</span>
    <div class="confirm-actions">
      <button id="confirmClearBtn" class="btn-sm btn-danger">Clear</button>
      <button id="cancelClearBtn" class="btn-sm btn-ghost">Cancel</button>
    </div>
  </div>

  <!-- API key form -->
  <div id="apiKeySection" class="form-section">
    <label for="apiKey">OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-…">
    <button id="saveButton" class="save-btn">Save Key</button>
    <p id="apiKeyFeedback" class="feedback-msg"></p>
  </div>

  <!-- Review panel -->
  <div id="reviewSection" style="display:none">
    <div class="review-toolbar">
      <span class="section-label">Latest Review</span>
      <button id="copyButton" class="copy-btn" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
    </div>

    <!-- Loading state -->
    <div id="loadingState" class="state-box" style="display:none">
      <div class="spinner-ring"></div>
      <span class="state-title">Generating review…</span>
      <span class="state-hint">This may take up to 30 seconds.</span>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="state-box" style="display:none">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span class="state-title">No review yet</span>
      <span class="state-hint">Go to a Bitbucket PR diff page and click "Review this PR" to get started.</span>
    </div>

    <!-- Review card -->
    <div id="reviewCard" class="review-card" style="display:none">
      <div class="review-meta">
        <a id="metaUrl" href="#" target="_blank" class="meta-url"></a>
        <span id="metaTime" class="meta-time"></span>
      </div>
      <div id="reviewContent" class="markdown"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
